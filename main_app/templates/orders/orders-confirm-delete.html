{% extends 'base.html' %} 
{% load static %} 
{% block head %}
    <link rel="stylesheet" href="{% static 'css/orders/orders-delete-confirm.css' %}" />
{% endblock %}
{% block content %}
<div class="confirm-delete-container">
    <h2>Confirm Deletion</h2>
    <p>Are you sure you want to delete the log: <strong>"{{ object.name }}"</strong>?</p>
    
    <form method="POST">
        {% csrf_token %}
        <div class="button-group">
            <button type="submit" class="btn btn-danger">Confirm Delete</button>

            <a href="{% url 'orders-detail' object.id %}">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
