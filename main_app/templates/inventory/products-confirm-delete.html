{% extends 'base.html' %}
{% load static %}

{% block head %}
    <link rel="stylesheet" href="{% static 'css/inventory/products-delete.css' %}" />
{% endblock %}

{% block content %}
<div class="delete-wrapper">
    <div class="delete-card">
        <div class="warning-icon">⚠️</div>
        <h1>Are you sure?</h1>
        <p>You are about to delete <strong>{{ object.name }}</strong>. This action cannot be undone.</p>
        
        <form method="post">
            {% csrf_token %}
            <div class="delete-actions">
                <button type="submit" class="btn-confirm-delete">Yes, Delete Permanently</button>
                <a href="{% url 'products-detail' object.id %}" class="btn-cancel">No, Keep Product</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
